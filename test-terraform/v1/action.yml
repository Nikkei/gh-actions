name: Test terraform
description: Test terraform configurations

inputs:
  github-token:
    description: The Github token used to comment
    required: true
  terraform-version:
    description: The version of terraform
    required: true

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Terraform format
      shell: bash
      run: terraform fmt -check -recursive ./

    - name: Run tfsec PR commenter
      uses: aquasecurity/tfsec-pr-commenter-action@7a44c5dcde5dfab737363e391800629e27b6376b # v1.3.1
      with:
        github_token: ${{ inputs.github-token }}
        tfsec_args: -m LOW
