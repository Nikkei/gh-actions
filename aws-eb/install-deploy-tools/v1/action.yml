name: Install deploy tools
description: "Install tools for deployment"

inputs:
  python-version:
    description: "Version of installed python"
    required: false
    default: "3.12"

runs:
  using: "composite"
  steps:
    - name: Set up python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Install ebi and awsebcli
      shell: bash
      env:
        REQUIREMENTS_FILE: ${{ github.action_path }}/requirements.txt
      run: |
        uv pip install -q --system --require-hashes -r "$REQUIREMENTS_FILE"

        # Check commands
        eb --version
        ebi --help

    - name: Install yq
      shell: bash
      working-directory: /tmp
      env:
        YQ_VERSION: v4.53.2
        # yq_linux_amd64.tar.gz の SHA256（YQ_VERSION 更新時に併せて更新すること）
        YQ_SHA256: 44c3c6df6c58ef1460d98425954ca5e832926e0e8a1d75c5c8fd261691351510
      run: |
        wget -q "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64.tar.gz" -O yq_linux_amd64.tar.gz
        echo "${YQ_SHA256}  yq_linux_amd64.tar.gz" | sha256sum -c -
        tar xzf yq_linux_amd64.tar.gz
        sudo mv yq_linux_amd64 /usr/local/bin/yq

        # Check command
        yq -V
